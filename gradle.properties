# Project-wide Gradle settings.

# Enable AndroidX (required for all modern androidx.* dependencies)
android.useAndroidX=true

# Automatically migrate any old support-library dependencies to AndroidX
android.enableJetifier=true

# Kotlin code style for this project: "official" or "obsolete"
kotlin.code.style=official

# Enables namespacing of each library's R class so that R class inclusion
# does not waste space in the APK.
android.nonTransitiveRClass=true
